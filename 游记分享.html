<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>途游旅游 - 游记分享</title>
  <link rel="stylesheet" href="网页.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="网页.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #66afea 0%, #6b4ba2 100%);
      min-height: 100vh;
    }

    .travel-notes-container {
      max-width: 1600px;
      margin: 40px auto;
      padding: 20px;
    }

    .page-title {
      text-align: center;
      color: #fff;
      font-size: 36px;
      margin-bottom: 40px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 30px;
    }

    .note-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .note-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .note-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .note-content {
      padding: 20px;
    }

    .note-title {
      font-size: 20px;
      color: #1a365d;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .note-meta {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #666;
    }

    .note-author {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .author-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      overflow: hidden;
    }

    .author-avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .note-date {
      color: #999;
    }

    .note-stats {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }

    .note-likes,
    .note-comments {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .note-comments {
      color: #666;
    }

    .note-comments:hover {
      color: #667eea;
      cursor: pointer;
    }

    .note-excerpt {
      color: #555;
      line-height: 1.6;
      font-size: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .note-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 15px;
    }

    .note-tag {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 4px 12px;
      border-radius: 15px;
      font-size: 12px;
    }

    .note-footer {
      padding: 15px 20px;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .note-likes {
      color: #666;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .read-more-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: opacity 0.3s ease;
    }

    .read-more-btn:hover {
      opacity: 0.9;
    }

    .empty-notes {
      text-align: center;
      padding: 60px 20px;
      color: white;
      font-size: 18px;
    }

    .empty-notes p {
      margin-bottom: 20px;
    }

    .create-note-btn {
      display: inline-block;
      background: white;
      color: #667eea;
      padding: 12px 30px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.3s ease;
    }

    .create-note-btn:hover {
      transform: scale(1.05);
    }

    .section-title {
      color: #fff;
      font-size: 28px;
      margin: 30px 0 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
    }
  </style>
</head>

<body>
  <header>
    <div class="nav-container">
      <div class="slide1"></div>
      <div class="slide2"></div>
      <ul id="nav">
        <li><a href="./网页.html">首页</a></li>
        <li><a href="./古城古镇网页.html">古城古镇</a></li>
        <li><a href="./自然风光网页.html">自然风光</a></li>
        <li><a href="./城市漫游网页.html">城市漫游</a></li>
        <li><a href="./小众秘境.html">小众秘境</a></li>
        <li data-current="true"><a href="./游记分享.html">游记分享</a></li>
        <li><a href="./我的.html">我的</a></li>
      </ul>
    </div>
  </header>

  <div class="travel-notes-container">
    <h1 class="page-title">—— 游记分享 ——</h1>

    <!-- 搜索框 -->
    <div class="search-container" style="margin-bottom: 30px; text-align: center;">
      <div class="search-box" style="display: inline-flex; max-width: 600px; width: 100%;">
        <input type="text" placeholder="搜索游记标题..." id="search-input"
          style="flex: 1; padding: 12px 16px; border: none; border-radius: 25px 0 0 25px; font-size: 16px;">
        <button id="search-btn"
          style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 0 24px; border-radius: 0 25px 25px 0; cursor: pointer; font-size: 16px;">搜索</button>
      </div>
    </div>

    <h2 class="section-title">热门游记</h2>
    <div class="notes-grid" id="notes-grid">
      <!-- 游记内容将通过JavaScript动态加载 -->
    </div>

    <!-- 分页组件 -->
    <div class="pagination"
      style="display: flex; justify-content: center; align-items: center; margin-top: 40px; gap: 10px;">
      <button class="pagination-btn"
        style="padding: 8px 16px; border: 1px solid #667eea; background: white; color: #667eea; border-radius: 20px; cursor: pointer; font-size: 14px;">上一页</button>
      <button class="pagination-btn active"
        style="padding: 8px 16px; border: 1px solid #667eea; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px; cursor: pointer; font-size: 14px;">1</button>
      <button class="pagination-btn"
        style="padding: 8px 16px; border: 1px solid #667eea; background: white; color: #667eea; border-radius: 20px; cursor: pointer; font-size: 14px;">2</button>
      <button class="pagination-btn"
        style="padding: 8px 16px; border: 1px solid #667eea; background: white; color: #667eea; border-radius: 20px; cursor: pointer; font-size: 14px;">3</button>
      <span style="color: #666; font-size: 14px;">...</span>
      <button class="pagination-btn"
        style="padding: 8px 16px; border: 1px solid #667eea; background: white; color: #667eea; border-radius: 20px; cursor: pointer; font-size: 14px;">10</button>
      <button class="pagination-btn"
        style="padding: 8px 16px; border: 1px solid #667eea; background: white; color: #667eea; border-radius: 20px; cursor: pointer; font-size: 14px;">下一页</button>
    </div>
  </div>

  <script>
    // 页面加载时显示所有游记
    document.addEventListener('DOMContentLoaded', async function () {
      console.log('DOMContentLoaded事件触发，开始加载游记');
      try {
        await loadTravelNotes();
        setupSearch();
        setupPagination();
      } catch (error) {
        console.error('页面加载失败:', error);
      }
    });

    // 加载游记数据
    async function loadTravelNotes(page = 1, limit = 10, searchTerm = '') {
      const notesGrid = document.getElementById('notes-grid');

      // 显示加载状态
      notesGrid.innerHTML = `
        <div class="empty-notes">
          <p>正在加载游记...</p>
        </div>
      `;

      try {
        // 构建API请求URL
        let url = `${API_BASE_URL}/notes`;
        console.log('API_BASE_URL:', API_BASE_URL);

        // 添加查询参数
        const params = new URLSearchParams();
        params.append('page', page);
        params.append('limit', limit);
        if (searchTerm) {
          params.append('title', searchTerm);
        }

        if (params.toString()) {
          url += '?' + params.toString();
        }

        console.log('请求游记API:', url);
        const response = await fetch(url);

        console.log('API响应状态:', response.status);

        if (!response.ok) {
          let errorText = 'API请求失败';
          try {
            const errorData = await response.text();
            errorText = errorData;
          } catch (e) {
            // 忽略解析错误
          }
          throw new Error(`API请求失败: ${response.status} - ${errorText}`);
        }

        const data = await response.json();
        console.log('游记API返回数据:', data);

        const travelNotes = data.notes || data || [];

        if (travelNotes.length === 0) {
          notesGrid.innerHTML = `
            <div class="empty-notes">
              <p>还没有游记，快来发布第一篇游记吧！</p>
              <a href="./发布游记页.html" class="create-note-btn">发布游记</a>
            </div>
          `;
          return;
        }

        // 清空现有内容
        notesGrid.innerHTML = '';

        console.log('获取到的游记数据:', travelNotes);
        console.log('游记数量:', travelNotes.length);

        // 添加用户发布的游记（只显示已审核通过的）
        for (const note of travelNotes) {
          // 只显示审核通过的游记
          if (note.status !== 'approved') {
            console.log('跳过未审核游记:', note.title, '状态:', note.status);
            continue;
          }

          const noteCard = document.createElement('div');
          noteCard.className = 'note-card';

          // 处理图片URL
          let coverImage = note.cover_img || './旅游图片/默认封面.jpg';
          if (coverImage && coverImage.includes('localhost:3000')) {
            coverImage = coverImage.replace('localhost:3000', '10.13.99.225:3000');
          }
          if (coverImage && coverImage.startsWith('./')) {
            coverImage = `http://10.13.99.225:3000${coverImage.replace('./', '/')}`;
          }

          // 生成关联景点链接
          let spotLink = '#';
          let spotName = note.spot || note.scenic_name || '';
          if (spotName) {
            if (spotName.includes('乌镇')) {
              spotLink = './古城古镇网页.html#浙江乌镇';
            } else if (spotName.includes('凤凰')) {
              spotLink = './古城古镇网页.html#湖南凤凰古城';
            } else if (spotName.includes('南浔')) {
              spotLink = './古城古镇网页.html#南浔古镇';
            } else if (spotName.includes('九寨沟')) {
              spotLink = './自然风光网页.html#四川九寨沟';
            } else if (spotName.includes('阳朔')) {
              spotLink = './自然风光网页.html#广西阳朔';
            } else if (spotName.includes('武功山')) {
              spotLink = './自然风光网页.html#江西武功山';
            } else if (spotName.includes('重庆')) {
              spotLink = './城市漫游网页.html#重庆';
            } else if (spotName.includes('上海')) {
              spotLink = './城市漫游网页.html#上海';
            } else if (spotName.includes('成都')) {
              spotLink = './城市漫游网页.html#成都';
            }
          }

          // 处理标签
          let tags = [];
          if (note.tags) {
            if (Array.isArray(note.tags)) {
              tags = note.tags;
            } else if (typeof note.tags === 'string') {
              tags = note.tags.split(',').map(tag => tag.trim());
            }
          }

          // 处理日期 - 使用后端实际字段
          let date = note.create_time || note.created_at || note.date;
          if (date) {
            if (date.includes('T')) {
              date = date.split('T')[0];
            }
          }

          // 处理用户信息 - 优先显示昵称，没有昵称再显示账号
          let userName = note.nickname || note.username || note.author || '匿名用户';
          let userAvatarUrl = null;

          // 如果游记数据中没有昵称或头像，尝试根据user_id获取用户信息
          if ((!note.nickname || !note.author_avatar) && note.user_id) {
            try {
              const userResponse = await fetch(`http://10.13.99.225:3000/api/users/${note.user_id}`);
              if (userResponse.ok) {
                const userData = await userResponse.json();
                userName = userData.nickname || userData.username || userName;
                userAvatarUrl = userData.avatar;
              }
            } catch (error) {
              console.log('获取用户信息失败，使用默认用户名');
            }
          }

          // 如果游记数据中有头像，优先使用
          if (!userAvatarUrl && note.author_avatar) {
            userAvatarUrl = note.author_avatar;
          }

          // 处理头像显示
          let userAvatarHtml = '';
          if (userAvatarUrl) {
            userAvatarHtml = `<img src="${userAvatarUrl}" alt="${userName}" class="author-avatar-img" onerror="this.style.display='none'; this.parentElement.textContent='${userName.charAt(0)}';">`;
          } else {
            userAvatarHtml = userName.charAt(0);
          }

          // 处理点赞数 - 使用后端实际字段
          const likeCount = note.like_count || note.likes || 0;

          // 暂时使用后端返回的评论数，后续会异步获取实际评论数
          let commentCount = note.comment_count || note.comments_count || 0;

          noteCard.innerHTML = `
              <img src="${coverImage}" alt="${note.title}" class="note-image" onerror="this.src='./旅游图片/默认封面.jpg'">
          <div class="note-content">
            <h3 class="note-title">${note.title}</h3>
            <div class="note-meta">
              <div class="note-author">
                <div class="author-avatar">${userAvatarHtml}</div>
                <span>${userName}</span>
              </div>
              <span class="note-date">${date || '2024-01-01'}</span>
            </div>
            <p class="note-excerpt">${note.content ? note.content.substring(0, 150) + '...' : note.excerpt || '这是一篇精彩的游记'}</p>
            ${spotName ? `
              <div style="margin: 10px 0; font-size: 14px; color: #667eea;">
                <strong>关联景点：</strong>
                <a href="${spotLink}" style="color: #667eea; text-decoration: none;">${spotName}</a>
              </div>
            ` : ''}
            ${tags.length > 0 ? `
              <div class="note-tags">
                ${tags.map(tag => `<span class="note-tag">${tag}</span>`).join('')}
              </div>
            ` : ''}
            <div class="note-stats">
              <span class="note-likes">❤️ ${likeCount}</span>
              <span class="note-comments">💬 ${commentCount}</span>
            </div>
          </div>
          <div class="note-footer">
            <a href="./游记详情页.html?id=${note.id}" class="read-more-btn" style="text-decoration: none; display: inline-block;" data-note-id="${note.id}">阅读全文</a>
          </div>
          `;

          // 添加到游记网格
          notesGrid.appendChild(noteCard);

          // 异步获取实际评论数
          (async function (noteId, card) {
            try {
              const response = await fetch(`http://10.13.99.225:3000/api/notes/${noteId}/comments`);
              if (response.ok) {
                const comments = await response.json();
                const actualCommentCount = comments.length;

                // 更新卡片上的评论数
                const commentCountElement = card.querySelector('.note-comments');
                if (commentCountElement) {
                  commentCountElement.textContent = `💬 ${actualCommentCount}`;
                }
              }
            } catch (error) {
              console.log('获取评论数失败:', error);
            }
          })(note.id, noteCard);
        };
      } catch (error) {
        console.error('加载游记失败:', error);
        notesGrid.innerHTML = `
          <div class="empty-notes">
            <p>加载游记失败，请稍后重试</p>
            <a href="./发布游记页.html" class="create-note-btn">发布游记</a>
          </div>
        `;
      }
    }

    // 搜索功能
    function setupSearch() {
      const searchInput = document.getElementById('search-input');
      const searchBtn = document.getElementById('search-btn');
      let searchTimeout;

      async function performSearch() {
        const searchTerm = searchInput.value.trim();

        // 调用后端API进行搜索
        await loadTravelNotes(1, 10, searchTerm);

        // 更新搜索结果统计
        updateSearchResults();
      }

      // 更新搜索结果统计
      function updateSearchResults() {
        let resultsText = document.getElementById('search-results-text');

        if (!resultsText) {
          resultsText = document.createElement('div');
          resultsText.id = 'search-results-text';
          resultsText.style.cssText = 'text-align: center; color: white; margin: 20px 0; font-size: 16px;';
          searchInput.parentNode.parentNode.appendChild(resultsText);
        }

        if (searchInput.value.trim() === '') {
          resultsText.innerHTML = '';
        } else {
          resultsText.innerHTML = `搜索: "<strong>${searchInput.value}</strong>"`;
        }
      }

      // 清除搜索
      function clearSearch() {
        searchInput.value = '';
        loadTravelNotes(1, 10, '');
        updateSearchResults();
      }

      // 添加清除按钮
      function addClearButton() {
        const clearBtn = document.createElement('button');
        clearBtn.id = 'clear-search-btn';
        clearBtn.innerHTML = '×';
        clearBtn.style.cssText = `
           position: absolute;
           right: 85px;
           top: 50%;
           transform: translateY(-50%);
           background: none;
           border: none;
           color: #999;
           font-size: 18px;
           cursor: pointer;
           width: 25px;
           height: 25px;
           border-radius: 50%;
           display: flex;
           align-items: center;
           justify-content: center;
           transition: all 0.3s ease;
         `;

        clearBtn.addEventListener('mouseenter', function () {
          this.style.background = '#f1f5f9';
          this.style.color = '#667eea';
        });

        clearBtn.addEventListener('mouseleave', function () {
          this.style.background = 'none';
          this.style.color = '#999';
        });

        clearBtn.addEventListener('click', clearSearch);

        searchInput.parentNode.style.position = 'relative';
        searchInput.parentNode.appendChild(clearBtn);

        // 根据输入内容显示/隐藏清除按钮
        searchInput.addEventListener('input', function () {
          clearBtn.style.display = this.value ? 'flex' : 'none';
        });

        clearBtn.style.display = searchInput.value ? 'flex' : 'none';
      }

      // 搜索按钮点击事件
      searchBtn.addEventListener('click', performSearch);

      // 回车键搜索
      searchInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
          performSearch();
        }
      });

      // 实时搜索（防抖）
      searchInput.addEventListener('input', function () {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(performSearch, 500);
      });

      // 添加清除按钮
      addClearButton();
    }

    // 分页功能
    function setupPagination() {
      const paginationBtns = document.querySelectorAll('.pagination-btn');
      let currentPage = 1;

      paginationBtns.forEach(btn => {
        btn.addEventListener('click', async function () {
          const text = this.textContent.trim();

          if (text === '上一页') {
            if (currentPage > 1) {
              currentPage--;
              await loadTravelNotes(currentPage, 10, '');
              updatePaginationButtons();
            }
          } else if (text === '下一页') {
            currentPage++;
            await loadTravelNotes(currentPage, 10, '');
            updatePaginationButtons();
          } else if (!isNaN(text)) {
            currentPage = parseInt(text);
            await loadTravelNotes(currentPage, 10, '');
            updatePaginationButtons();
          }
        });
      });

      function updatePaginationButtons() {
        paginationBtns.forEach(btn => {
          const text = btn.textContent.trim();
          if (!isNaN(text) && parseInt(text) === currentPage) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });
      }
    }
  </script>
</body>

</html>
