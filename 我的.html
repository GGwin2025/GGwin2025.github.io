<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏</title>
  <link rel="stylesheet" href="网页.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="网页.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #66afea 0%, #6b4ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 强制居中样式 */
    .user-auth-container {
      max-width: 1600px !important;
      margin: 50px auto !important;
      padding: 20px !important;
      width: 100% !important;
    }

    #user-profile {
      max-width: 1600px !important;
      margin: 0 auto !important;
      width: 100% !important;
    }

    .tab-content {
      max-width: 1600px !important;
      margin: 0 auto !important;
      width: 100% !important;
    }

    .tab-content h2 {
      text-align: center !important;
    }

    .empty-notes {
      text-align: center !important;
      width: 100% !important;
      max-width: 1600px !important;
      margin: 0 auto !important;
    }

    .publish-section {
      text-align: right !important;
    }

    h1 {
      text-align: center;
      margin-top: 30px;
      margin-bottom: 30px;
      color: #1a365d;
      font-weight: 600;
    }

    .user-auth-container {
      max-width: 1600px;
      margin: 50px auto;
      padding: 20px;
      flex: 1;
      width: 100%;
    }

    .user-auth-container.login-mode {
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
      flex: 1;
    }

    #login-section {
      background-color: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    #login-section:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }

    #login-section h1 {
      color: #1a365d;
      margin-bottom: 30px;
      font-size: 24px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #1a365d;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
      background-color: #f8fafc;
    }

    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      background-color: white;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 30px;
    }

    .login-btn,
    .register-btn,
    #logout-btn,
    .admin-login-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .login-btn {
      background-color: #1a365d;
      color: white;
      flex: 1;
    }

    .login-btn:hover {
      background-color: #152a47;
      transform: translateY(-2px);
    }

    .register-btn {
      background-color: #3b82f6;
      color: white;
      flex: 1;
    }

    .register-btn:hover {
      background-color: #2563eb;
      transform: translateY(-2px);
    }

    .avatar-upload {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .avatar-preview {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      font-weight: 600;
      overflow: hidden;
    }

    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-select-btn {
      padding: 8px 16px;
      background-color: #f1f5f9;
      color: #475569;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .avatar-select-btn:hover {
      background-color: #e2e8f0;
      border-color: #667eea;
      color: #667eea;
    }

    #logout-btn {
      background-color: #ef4444;
      color: white;
      padding: 8px 16px;
      font-size: 14px;
    }

    #logout-btn:hover {
      background-color: #dc2626;
      transform: translateY(-1px);
    }

    .admin-login {
      margin-top: 25px;
      text-align: center;
    }

    .admin-login-btn {
      background-color: #10b981;
      color: white;
      padding: 10px 20px;
      font-size: 14px;
    }

    .admin-login-btn:hover {
      background-color: #059669;
      transform: translateY(-1px);
    }

    #user-profile {
      background-color: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.6s ease-out;
      max-width: 1600px !important;
      margin: 0 auto !important;
      width: 100% !important;
    }

    .user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      margin: auto;
      width: 500px;
      padding: 30px;
      background-color: #f8fafc;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      max-width: 500px;
    }

    #current-user {
      font-size: 18px;
      font-weight: 600;
      color: #1a365d;
    }

    /* 动画效果 */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #login-section {
      animation: fadeIn 0.6s ease-out;
    }

    #user-profile {
      animation: fadeIn 0.6s ease-out;
    }

    .form-group input {
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      transform: scale(1.02);
    }

    .favorites-container {
      max-width: 1600px !important;
      margin: 0 auto !important;
      padding: 30px;
      width: 100% !important;
    }

    /* 收藏卡片样式优化 */
    .favorite-card {
      background-color: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .favorite-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    /* 标签页样式 */
    .profile-tabs {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      border-bottom: 2px solid #e2e8f0;
      max-width: 1600px;
      margin-left: auto;
      margin-right: auto;
    }

    .tab-content {
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .tab-content h2 {
      padding: 0 30px;
      margin-bottom: 20px;
      color: #1a365d;
      text-align: center;
    }

    .publish-section {
      max-width: 1600px;
      margin: 20px auto;
      padding: 0 30px;
    }

    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: none;
      color: #666;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .tab-btn:hover {
      color: #667eea;
    }

    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    /* 我的游记卡片样式 */
    .my-notes-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      padding: 30px;
      max-width: 1600px !important;
      margin: 0 auto !important;
      width: 100% !important;
    }

    .my-note-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .my-note-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    .my-note-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .my-note-content {
      padding: 16px;
    }

    .my-note-title {
      font-size: 16px;
      color: #1a365d;
      margin-bottom: 8px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .my-note-meta {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
    }

    .my-note-excerpt {
      font-size: 14px;
      color: #555;
      line-height: 1.4;
      height: 40px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      margin-bottom: 12px;
    }

    .my-note-actions {
      display: flex;
      gap: 8px;
    }

    .my-note-btn {
      flex: 1;
      padding: 6px 12px;
      border: 1px solid #e2e8f0;
      background: white;
      color: #666;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s ease;
    }

    .my-note-btn:hover {
      background: #f8fafc;
      border-color: #667eea;
      color: #667eea;
    }

    .my-note-btn.delete:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    .empty-notes {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-size: 16px;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
      grid-column: 1 / -1;
    }

    .empty-notes p {
      margin-bottom: 20px;
    }

    .empty-notes a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .empty-notes a:hover {
      text-decoration: underline;
    }

    /* 编辑模态框样式 */
    .edit-note-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      position: relative;
      background: white;
      border-radius: 16px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      animation: modalSlideIn 0.3s ease-out;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      border-bottom: 1px solid #e2e8f0;
    }

    .modal-header h3 {
      color: #1a365d;
      font-size: 20px;
      font-weight: 600;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #666;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .close-btn:hover {
      background: #f1f5f9;
      color: #ef4444;
    }

    .modal-body {
      padding: 30px;
    }

    .modal-body .form-group {
      margin-bottom: 20px;
    }

    .modal-body label {
      display: block;
      margin-bottom: 8px;
      color: #1a365d;
      font-weight: 500;
      font-size: 14px;
    }

    .modal-body input,
    .modal-body select,
    .modal-body textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
      background-color: #f8fafc;
      font-family: inherit;
    }

    .modal-body textarea {
      resize: vertical;
      min-height: 120px;
    }

    .modal-body input:focus,
    .modal-body select:focus,
    .modal-body textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      background-color: white;
    }

    .modal-body .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 30px;
    }

    .modal-body .form-btn {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .modal-body .form-btn.cancel {
      background-color: #e2e8f0;
      color: #666;
    }

    .modal-body .form-btn.cancel:hover {
      background-color: #cbd5e1;
    }

    .modal-body .form-btn.submit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .modal-body .form-btn.submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    /* 标签输入样式 */
    .tags-input-container {
      margin-top: 8px;
    }

    .tags-input {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 8px 12px;
      background: white;
      transition: border-color 0.3s ease;
    }

    .tags-input:focus-within {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    #edit-tag-input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 14px;
      padding: 0;
      background: transparent;
    }

    .tags-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      min-height: 32px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      background: #f1f5f9;
      color: #475569;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
      animation: tagAppear 0.3s ease;
    }

    .tag-remove {
      margin-left: 6px;
      cursor: pointer;
      color: #94a3b8;
      font-size: 14px;
      line-height: 1;
    }

    .tag-remove:hover {
      color: #ef4444;
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes tagAppear {
      from {
        opacity: 0;
        transform: scale(0.8);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .user-auth-container {
        max-width: 90%;
        margin: 30px auto;
      }

      #login-section {
        padding: 30px;
      }

      .form-actions {
        flex-direction: column;
      }

      .login-btn,
      .register-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="nav-container">
      <div class="slide1"></div>
      <div class="slide2"></div>
      <ul id="nav">
        <li><a href="./网页.html">首页</a></li>
        <li><a href="./古城古镇网页.html">古城古镇</a></li>
        <li><a href="./自然风光网页.html">自然风光</a></li>
        <li><a href="./城市漫游网页.html">城市漫游</a></li>
        <li><a href="./小众秘境.html">小众秘境</a></li>
        <li><a href="./游记分享.html">游记分享</a></li>
        <li data-current="true"><a href="./我的.html">我的</a></li>
      </ul>
    </div>
  </header>

  <div class="user-auth-container">
    <div id="login-section">
      <h1 id="auth-title">用户登录</h1>
      <!-- 登录表单 -->
      <form id="login-form">
        <div class="form-group">
          <label for="username">账号</label>
          <input type="text" id="username" placeholder="请输入账号" required>
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <div class="form-actions">
          <button type="submit" class="login-btn">登录</button>
          <button type="button" class="register-btn" id="show-register-btn">注册</button>
        </div>
        <div class="admin-login">
          <button type="button" class="admin-login-btn">管理员登录</button>
          <a href="http://10.13.99.225:3000/admin" class="admin-review-btn"
            style="display: inline-block; margin-top: 10px; background-color: #8b5cf6; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-size: 14px; transition: all 0.3s ease; box-shadow: 0 2px 5px rgba(139, 92, 246, 0.3);">审核管理</a>
        </div>
      </form>

      <!-- 注册表单 -->
      <form id="register-form" style="display: none;">
        <div class="form-group">
          <label for="reg-avatar">头像</label>
          <div class="avatar-upload">
            <div class="avatar-preview" id="reg-avatar-preview">
              <span id="reg-avatar-initial">用</span>
            </div>
            <input type="file" id="reg-avatar" accept="image/*" style="display: none;">
            <button type="button" class="avatar-select-btn" id="reg-avatar-select">选择头像</button>
          </div>
        </div>
        <div class="form-group">
          <label for="reg-nickname">昵称</label>
          <input type="text" id="reg-nickname" placeholder="请输入昵称" required>
        </div>
        <div class="form-group">
          <label for="reg-username">账号</label>
          <input type="text" id="reg-username" placeholder="请输入账号" required>
        </div>
        <div class="form-group">
          <label for="reg-password">密码</label>
          <input type="password" id="reg-password" placeholder="请输入密码" required>
        </div>
        <div class="form-actions">
          <button type="submit" class="register-btn" style="flex: 1;">注册</button>
          <button type="button" class="login-btn" id="show-login-btn" style="flex: 1;">返回</button>
        </div>
      </form>
    </div>

    <div id="user-profile" style="display: none;">
      <h1>个人中心</h1>
      <div class="user-info">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
          <div class="avatar-preview" id="profile-avatar" style="width: 100px; height: 100px; font-size: 40px;">
            <span id="profile-avatar-initial">用</span>
          </div>
          <div style="text-align: center;">
            <span id="current-nickname"
              style="font-size: 24px; font-weight: 600; color: #1a365d; display: block;"></span>
            <p id="current-user" style="font-size: 16px; color: #666; margin-top: 8px;"></p>
          </div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 12px; align-items: center; width: 100%;">
          <button id="edit-profile-btn" class="login-btn"
            style="padding: 12px 24px; font-size: 16px; width: 140px;">编辑资料</button>
          <button id="logout-btn" style="padding: 12px 24px; font-size: 16px; width: 140px;">退出登录</button>
        </div>
      </div>

      <!-- 标签页导航 -->
      <div class="profile-tabs" style="display: flex; gap: 20px; margin: 30px 0; border-bottom: 2px solid #e2e8f0;">
        <button class="tab-btn active" data-tab="favorites">我的收藏</button>
        <button class="tab-btn" data-tab="notes">我的游记</button>
      </div>

      <!-- 发布游记按钮 -->
      <div class="publish-section" id="publish-section" style="margin: 20px 0; text-align: right; display: none;">
        <a href="./发布游记页.html" class="publish-btn"
          style="display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 24px; border-radius: 25px; text-decoration: none; font-weight: 500; font-size: 14px;">发布游记</a>
      </div>

      <!-- 我的收藏内容 -->
      <div class="tab-content" id="favorites-content">
        <h2>我的收藏</h2>
        <div class="favorites-container">
          <!-- 收藏的卡片将在这里显示 -->
        </div>
      </div>

      <!-- 我的游记内容 -->
      <div class="tab-content" id="notes-content" style="display: none;">
        <h2>我的游记</h2>
        <div class="my-notes-container">
          <!-- 我的游记卡片将在这里显示 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 编辑资料模态框 -->
  <div id="edit-profile-modal" class="edit-note-modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>编辑资料</h3>
        <button class="close-btn" id="close-edit-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>头像</label>
          <div class="avatar-upload">
            <div class="avatar-preview" id="edit-avatar-preview">
              <span id="edit-avatar-initial">用</span>
            </div>
            <input type="file" id="edit-avatar" accept="image/*" style="display: none;">
            <button type="button" class="avatar-select-btn" id="edit-avatar-select">更换头像</button>
          </div>
        </div>
        <div class="form-group">
          <label for="edit-nickname">昵称</label>
          <input type="text" id="edit-nickname" placeholder="请输入昵称">
        </div>
        <div class="form-actions">
          <button type="button" class="form-btn cancel" id="cancel-edit-btn">取消</button>
          <button type="button" class="form-btn submit" id="save-edit-btn">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', async function () {
      // 检查用户登录状态
      checkLoginStatus();

      // 登录表单提交
      document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
          // 使用后端API登录
          const response = await fetch('http://10.13.99.225:3000/api/user/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
          });

          const data = await response.json();

          if (data.success) {
            // 保存当前用户
            localStorage.setItem('currentUser', JSON.stringify(data.user));
            showUserProfile(data.user);
            renderFavorites();
            initFavoriteButtons();
            alert('登录成功！');
          } else {
            alert(data.message || '登录失败');
          }
        } catch (error) {
          console.error('登录失败:', error);
          alert('登录失败，请稍后重试');
        }
      });

      // 显示注册表单
      document.getElementById('show-register-btn').addEventListener('click', function () {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('register-form').style.display = 'block';
        document.getElementById('auth-title').textContent = '用户注册';
      });

      // 显示登录表单
      document.getElementById('show-login-btn').addEventListener('click', function () {
        document.getElementById('register-form').style.display = 'none';
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('auth-title').textContent = '用户登录';
      });

      // 注册表单头像选择
      document.getElementById('reg-avatar-select').addEventListener('click', function () {
        document.getElementById('reg-avatar').click();
      });

      // 注册表单头像预览
      document.getElementById('reg-avatar').addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            const preview = document.getElementById('reg-avatar-preview');
            preview.innerHTML = `<img src="${e.target.result}" alt="头像预览">`;
          };
          reader.readAsDataURL(file);
        }
      });

      // 注册表单提交
      document.getElementById('register-form').addEventListener('submit', async function (e) {
        e.preventDefault();

        const nickname = document.getElementById('reg-nickname').value.trim();
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value;

        if (!nickname || !username || !password) {
          alert('请填写完整信息');
          return;
        }

        try {
          // 使用后端API注册
          const response = await fetch('http://10.13.99.225:3000/api/user/register', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password, nickname })
          });

          const data = await response.json();

          if (data.success) {
            // 自动登录
            localStorage.setItem('currentUser', JSON.stringify(data.user));
            showUserProfile(data.user);
            renderFavorites();
            initFavoriteButtons();
            alert('注册成功！');
          } else {
            alert(data.message || '注册失败');
          }
        } catch (error) {
          console.error('注册失败:', error);
          alert('注册失败，请稍后重试');
        }
      });

      // 退出登录按钮点击
      document.getElementById('logout-btn').addEventListener('click', logout);

      // 管理员登录按钮点击
      document.querySelector('.admin-login-btn').addEventListener('click', function () {
        window.location.href = 'http://10.13.99.225:3000/login.html';
      });

      // 编辑资料按钮点击
      document.getElementById('edit-profile-btn').addEventListener('click', function () {
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) return;

        try {
          const userInfo = JSON.parse(currentUser);

          // 填充当前资料
          document.getElementById('edit-nickname').value = userInfo.nickname || '';

          // 设置头像预览
          const avatarPreview = document.getElementById('edit-avatar-preview');
          const avatarInitial = document.getElementById('edit-avatar-initial');
          if (userInfo.avatar && userInfo.avatar.trim() !== '') {
            avatarPreview.innerHTML = `<img src="${userInfo.avatar}" alt="头像" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><span style="display: none; width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; justify-content: center; align-items: center; font-size: 32px; font-weight: 600;">${(userInfo.nickname || userInfo.username || '用').charAt(0).toUpperCase()}</span>`;
          } else {
            const initial = userInfo.nickname ? userInfo.nickname.charAt(0) : (userInfo.username ? userInfo.username.charAt(0).toUpperCase() : '用');
            avatarInitial.textContent = initial;
          }

          // 显示模态框
          document.getElementById('edit-profile-modal').style.display = 'flex';
        } catch (error) {
          console.error('加载用户资料失败:', error);
        }
      });

      // 关闭编辑模态框
      document.getElementById('close-edit-modal').addEventListener('click', function () {
        document.getElementById('edit-profile-modal').style.display = 'none';
      });

      document.getElementById('cancel-edit-btn').addEventListener('click', function () {
        document.getElementById('edit-profile-modal').style.display = 'none';
      });

      document.querySelector('#edit-profile-modal .modal-overlay').addEventListener('click', function () {
        document.getElementById('edit-profile-modal').style.display = 'none';
      });

      // 更换头像按钮
      document.getElementById('edit-avatar-select').addEventListener('click', function () {
        document.getElementById('edit-avatar').click();
      });

      // 头像预览
      document.getElementById('edit-avatar').addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            const preview = document.getElementById('edit-avatar-preview');
            preview.innerHTML = `<img src="${e.target.result}" alt="头像预览">`;
          };
          reader.readAsDataURL(file);
        }
      });

      // 保存编辑资料
      document.getElementById('save-edit-btn').addEventListener('click', async function () {
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) return;

        try {
          const userInfo = JSON.parse(currentUser);
          const userId = userInfo.id;

          if (!userId) {
            alert('用户信息不完整');
            return;
          }

          // 构建请求参数
          const updateData = {
            nickname: document.getElementById('edit-nickname').value.trim()
          };

          // 处理头像
          const avatarFile = document.getElementById('edit-avatar').files[0];
          if (avatarFile) {
            // 先上传头像
            const formData = new FormData();
            formData.append('avatar', avatarFile);

            const avatarResponse = await fetch(`http://10.13.99.225:3000/api/users/${userId}/avatar`, {
              method: 'POST',
              body: formData
            });

            const avatarData = await avatarResponse.json();
            if (avatarData.success) {
              updateData.avatar = avatarData.avatar;
            }
          }

          // 更新用户信息
          const response = await fetch(`http://10.13.99.225:3000/api/users/${userId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(updateData)
          });

          const data = await response.json();

          if (data.success) {
            // 更新本地存储
            const updatedUser = { ...userInfo, ...updateData };
            localStorage.setItem('currentUser', JSON.stringify(updatedUser));

            // 刷新显示
            showUserProfile(updatedUser);

            // 关闭模态框
            document.getElementById('edit-profile-modal').style.display = 'none';

            alert('资料更新成功！');
          } else {
            alert(data.message || '更新失败');
          }
        } catch (error) {
          console.error('保存资料失败:', error);
          alert('保存失败，请稍后重试');
        }
      });

      // 标签页切换
      const tabBtns = document.querySelectorAll('.tab-btn');
      const tabContents = document.querySelectorAll('.tab-content');
      const publishSection = document.getElementById('publish-section');

      tabBtns.forEach(btn => {
        btn.addEventListener('click', async function () {
          const tab = this.getAttribute('data-tab');

          // 切换标签按钮状态
          tabBtns.forEach(b => b.classList.remove('active'));
          this.classList.add('active');

          // 切换内容显示
          tabContents.forEach(content => {
            content.style.display = 'none';
          });
          document.getElementById(`${tab}-content`).style.display = 'block';

          // 控制发布游记按钮的显示
          if (tab === 'notes') {
            publishSection.style.display = 'block';
            await renderMyNotes();
          } else {
            publishSection.style.display = 'none';
          }
        });
      });
    });

    // 渲染我的游记
    async function renderMyNotes() {
      const container = document.querySelector('.my-notes-container');
      if (!container) return;

      // 获取当前用户
      const currentUser = localStorage.getItem('currentUser');
      if (!currentUser) {
        container.innerHTML = `
          <div class="empty-notes">
            <p>请先登录查看您的游记</p>
            <a href="./我的.html">去登录</a>
          </div>
        `;
        return;
      }

      // 显示加载状态
      container.innerHTML = `
        <div class="empty-notes">
          <p>正在加载您的游记...</p>
        </div>
      `;

      try {
        // 构建用户ID
        let userId = currentUser;
        try {
          const userInfo = JSON.parse(currentUser);
          userId = userInfo.id || userInfo.userId || userInfo.username;
        } catch (error) {
          userId = currentUser;
        }

        // 调用后端API获取用户游记
        const response = await fetch(`${API_BASE_URL}/users/${userId}/notes`);

        if (!response.ok) {
          throw new Error('API请求失败');
        }

        const data = await response.json();
        const myNotes = data.notes || data || [];

        if (myNotes.length === 0) {
          container.innerHTML = `
            <div class="empty-notes">
              <p>你还没有发布过游记</p>
              <a href="./发布游记页.html">去发布第一篇游记</a>
            </div>
          `;
          return;
        }

        container.innerHTML = '';

        myNotes.forEach(note => {
          // 处理图片URL
          let coverImage = note.cover_img || './旅游图片/默认封面.jpg';
          if (coverImage && coverImage.includes('localhost:3000')) {
            coverImage = coverImage.replace('localhost:3000', '10.13.99.225:3000');
          }
          if (coverImage && coverImage.startsWith('./')) {
            coverImage = `http://10.13.99.225:3000${coverImage.replace('./', '/')}`;
          }

          // 处理日期 - 使用后端实际字段
          let date = note.create_time || note.created_at || note.date;
          if (date) {
            if (date.includes('T')) {
              date = date.split('T')[0];
            }
          }

          // 处理点赞数 - 使用后端实际字段
          const likeCount = note.like_count || note.likes || 0;

          // 暂时使用后端返回的评论数，后续会异步获取实际评论数
          let commentCount = note.comment_count || note.comments_count || 0;

          // 处理标签
          let tags = [];
          if (note.tags) {
            if (Array.isArray(note.tags)) {
              tags = note.tags;
            } else if (typeof note.tags === 'string') {
              tags = note.tags.split(',').map(tag => tag.trim());
            }
          }

          const card = document.createElement('div');
          card.className = 'my-note-card';
          card.innerHTML = `
            <img src="${coverImage}" alt="${note.title}" class="my-note-image">
            <div class="my-note-content">
              <h3 class="my-note-title">${note.title}</h3>
              <div class="my-note-meta">
                发布于 ${date || '2024-01-01'} · ❤️ ${likeCount} · 💬 <span class="my-note-comment-count">${commentCount}</span>
                ${note.spot || note.scenic_name ? `· 关联景点：${note.spot || note.scenic_name}` : ''}
              </div>
              <p class="my-note-excerpt">${note.content ? note.content.substring(0, 100) + '...' : note.excerpt || '这是一篇精彩的游记'}</p>
              ${tags.length > 0 ? `
                <div class="my-note-tags">
                  ${tags.map(tag => `<span class="my-note-tag">${tag}</span>`).join('')}
                </div>
              ` : ''}
              <div class="my-note-actions">
                <a href="./游记详情页.html?id=${note.id}" class="my-note-btn">查看</a>
                <button class="my-note-btn" onclick="editNote(${note.id})">编辑</button>
                <button class="my-note-btn delete" onclick="deleteNote(${note.id}, this)">删除</button>
              </div>
            </div>
          `;
          container.appendChild(card);

          // 异步获取实际评论数
          (async function (noteId, card) {
            try {
              const response = await fetch(`http://10.13.99.225:3000/api/notes/${noteId}/comments`);
              if (response.ok) {
                const comments = await response.json();
                const actualCommentCount = comments.length;

                // 更新卡片上的评论数
                const commentCountElement = card.querySelector('.my-note-comment-count');
                if (commentCountElement) {
                  commentCountElement.textContent = actualCommentCount;
                }
              }
            } catch (error) {
              console.log('获取评论数失败:', error);
            }
          })(note.id, card);
        });
      } catch (error) {
        console.error('加载我的游记失败:', error);
        container.innerHTML = `
          <div class="empty-notes">
            <p>加载游记失败，请稍后重试</p>
            <a href="./发布游记页.html">去发布游记</a>
          </div>
        `;
      }
    }

    // 编辑游记
    async function editNote(noteId) {
      try {
        // 调用后端API获取游记数据
        const response = await fetch(`${API_BASE_URL}/notes/${noteId}`);

        if (!response.ok) {
          alert('获取游记数据失败，请稍后重试');
          return;
        }

        const note = await response.json();

        // 创建编辑表单
        const editForm = document.createElement('div');
        editForm.className = 'edit-note-modal';
        editForm.innerHTML = `
          <div class="modal-overlay"></div>
          <div class="modal-content">
            <div class="modal-header">
              <h3>编辑游记</h3>
              <button class="close-btn" onclick="closeEditModal()">×</button>
            </div>
            <div class="modal-body">
              <form id="edit-note-form">
                <div class="form-group">
                  <label for="edit-title">游记标题</label>
                  <input type="text" id="edit-title" value="${note.title}" required>
                </div>
                <div class="form-group">
                  <label for="edit-spot">关联景点</label>
                  <select id="edit-spot">
                    <option value="">请选择景点</option>
                    <option value="浙江乌镇" ${note.spot === '浙江乌镇' ? 'selected' : ''}>浙江乌镇</option>
                    <option value="湖南凤凰古城" ${note.spot === '湖南凤凰古城' ? 'selected' : ''}>湖南凤凰古城</option>
                    <option value="南浔古镇" ${note.spot === '南浔古镇' ? 'selected' : ''}>南浔古镇</option>
                    <option value="四川九寨沟" ${note.spot === '四川九寨沟' ? 'selected' : ''}>四川九寨沟</option>
                    <option value="广西阳朔" ${note.spot === '广西阳朔' ? 'selected' : ''}>广西阳朔</option>
                    <option value="江西武功山" ${note.spot === '江西武功山' ? 'selected' : ''}>江西武功山</option>
                    <option value="重庆" ${note.spot === '重庆' ? 'selected' : ''}>重庆</option>
                    <option value="上海" ${note.spot === '上海' ? 'selected' : ''}>上海</option>
                    <option value="成都" ${note.spot === '成都' ? 'selected' : ''}>成都</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="edit-content">游记内容</label>
                  <textarea id="edit-content" rows="8" required>${note.content}</textarea>
                </div>
                <div class="form-group">
                  <label>标签</label>
                  <div class="tags-input-container">
                    <div class="tags-input">
                      <input type="text" id="edit-tag-input" placeholder="输入标签后按回车或逗号添加">
                    </div>
                    <div class="tags-list" id="edit-tags-list">
                      ${note.tags && note.tags.length > 0 ? note.tags.map(tag => `
                        <div class="tag">
                          ${tag}
                          <span class="tag-remove" onclick="removeEditTag('${tag}')">×</span>
                        </div>
                      `).join('') : ''}
                    </div>
                  </div>
                </div>
                <div class="form-actions">
                  <button type="button" class="form-btn cancel" onclick="closeEditModal()">取消</button>
                  <button type="submit" class="form-btn submit">保存修改</button>
                </div>
              </form>
            </div>
          </div>
        `;

        document.body.appendChild(editForm);

        // 初始化标签功能
        initEditTags(note.tags || []);

        // 表单提交
        document.getElementById('edit-note-form').addEventListener('submit', function (e) {
          e.preventDefault();
          saveEditedNote(noteId);
        });
      } catch (error) {
        console.error('加载游记数据失败:', error);
        alert('加载游记数据失败，请稍后重试');
      }
    }

    // 初始化编辑标签
    function initEditTags(initialTags) {
      const tagInput = document.getElementById('edit-tag-input');
      const tagsList = document.getElementById('edit-tags-list');
      let tags = [...initialTags];

      // 添加标签
      function addTag(tagText) {
        const trimmedTag = tagText.trim();
        if (trimmedTag && !tags.includes(trimmedTag)) {
          tags.push(trimmedTag);
          renderTags();
          tagInput.value = '';
        }
      }

      // 移除标签
      window.removeEditTag = function (tagText) {
        tags = tags.filter(tag => tag !== tagText);
        renderTags();
      }

      // 渲染标签
      function renderTags() {
        tagsList.innerHTML = '';
        tags.forEach(tag => {
          const tagElement = document.createElement('div');
          tagElement.className = 'tag';
          tagElement.innerHTML = `
            ${tag}
            <span class="tag-remove" onclick="removeEditTag('${tag}')">×</span>
          `;
          tagsList.appendChild(tagElement);
        });
      }

      // 标签输入事件
      tagInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ',') {
          e.preventDefault();
          addTag(this.value);
        }
      });

      tagInput.addEventListener('blur', function () {
        if (this.value.trim()) {
          addTag(this.value);
        }
      });

      // 保存标签到全局变量
      window.editTags = tags;
    }

    // 保存编辑的游记
    async function saveEditedNote(noteId) {
      const title = document.getElementById('edit-title').value.trim();
      const spot = document.getElementById('edit-spot').value;
      const content = document.getElementById('edit-content').value.trim();
      const tags = window.editTags || [];

      if (!title || !content) {
        alert('请填写标题和内容');
        return;
      }

      try {
        // 获取当前用户信息
        const currentUser = localStorage.getItem('currentUser');
        let userId = 1;

        if (currentUser) {
          try {
            const userInfo = JSON.parse(currentUser);
            userId = userInfo.id || 1;
          } catch (e) {
            console.log('解析用户信息失败，使用默认 ID');
          }
        }

        // 调用后端API更新游记
        const response = await fetch(`${API_BASE_URL}/notes/${noteId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            title: title,
            spot: spot,
            content: content,
            tags: tags,
            author_id: userId
          })
        });

        if (response.ok) {
          // 关闭模态框
          closeEditModal();

          // 重新渲染游记列表
          await renderMyNotes();

          alert('游记修改成功！');
        } else {
          const errorData = await response.json();
          alert('修改失败：' + (errorData.error || '请稍后重试'));
        }
      } catch (error) {
        console.error('保存游记失败:', error);
        alert('保存失败，请稍后重试');
      }
    }

    // 关闭编辑模态框
    function closeEditModal() {
      const modal = document.querySelector('.edit-note-modal');
      if (modal) {
        modal.remove();
      }
    }

    // 删除游记
    async function deleteNote(noteId, button) {
      if (!confirm('确定要删除这篇游记吗？删除后将无法恢复！')) {
        return;
      }

      const card = button.closest('.my-note-card');
      card.style.opacity = '0';
      card.style.transform = 'translateY(20px)';
      card.style.transition = 'all 0.3s ease';

      try {
        // 获取当前用户信息
        const currentUser = localStorage.getItem('currentUser');
        let userId = 1;

        if (currentUser) {
          try {
            const userInfo = JSON.parse(currentUser);
            userId = userInfo.id || 1;
          } catch (e) {
            console.log('解析用户信息失败，使用默认 ID');
          }
        }

        // 调用后端API删除游记
        const response = await fetch(`${API_BASE_URL}/notes/${noteId}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            author_id: userId
          })
        });

        if (response.ok) {
          setTimeout(() => {
            card.remove();

            // 检查是否还有游记
            const container = document.querySelector('.my-notes-container');
            if (container.children.length === 0) {
              container.innerHTML = `
                <div class="empty-notes">
                  <p>你还没有发布过游记</p>
                  <a href="./发布游记页.html">去发布第一篇游记</a>
                </div>
              `;
            }
          }, 300);
        } else {
          const errorData = await response.json();
          alert('删除失败：' + (errorData.error || '请稍后重试'));
          card.style.opacity = '1';
          card.style.transform = 'translateY(0)';
        }
      } catch (error) {
        console.error('删除游记失败:', error);
        alert('删除失败，请稍后重试');
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }
    }
